<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Catalog | Elumalaiyan Enterprises</title>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: '#D4AF37' }, fontFamily: { sans: ['Inter'], serif: ['Cinzel'] } } } }
    </script>
</head>
<body class="bg-[#fafafa] dark:bg-[#050505] text-neutral-900 dark:text-white transition-colors duration-500">

    <header id="main-nav" class="fixed top-0 inset-x-0 z-[100] transition-all duration-700 py-8">
        <nav class="max-w-7xl mx-auto px-6 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-4 group">
                <img src="logo.jpeg" alt="Logo" class="h-10 md:h-14 rounded-lg group-hover:scale-110 transition-transform">
                <span class="text-xl font-serif font-black tracking-widest uppercase">ELUMALAIYAN</span>
            </a>
            <div class="flex items-center gap-6">
                <button id="theme-toggle" class="w-10 h-10 border dark:border-neutral-800 rounded-full"><i id="theme-icon" class="fa-solid fa-moon"></i></button>
                <a href="index.html" class="text-[10px] font-black tracking-[0.3em] uppercase border-b-2 border-brand">Home</a>
            </div>
        </nav>
    </header>

    <main class="pt-48 pb-40 max-w-7xl mx-auto px-6">
        <div class="mb-24 space-y-12">
            <div class="text-center">
                <span class="text-brand font-black text-[10px] tracking-[0.5em] uppercase">Global Collection</span>
                <h1 class="text-6xl md:text-8xl font-serif font-black tracking-tighter uppercase leading-none mt-4">Full <br> <span class="text-brand opacity-40 italic">Catalog</span></h1>
            </div>
            
            <div class="relative max-w-2xl mx-auto">
                <input type="text" id="catalog-search" placeholder="SEARCH PREMIUM BRANDS OR PRODUCTS..." class="w-full bg-white/40 dark:bg-neutral-900/40 backdrop-blur-xl border border-white/20 dark:border-white/5 p-8 rounded-3xl font-black text-xs tracking-widest outline-none focus:ring-2 ring-brand shadow-2xl transition-all">
                <i class="fa-solid fa-magnifying-glass absolute right-8 top-1/2 -translate-y-1/2 opacity-20"></i>
            </div>
        </div>

        <div id="full-catalog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10">
            </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            productEngine({ containerId: 'full-catalog-grid', searchBoxId: 'catalog-search' });
        });
    </script>
</body>
</html>
