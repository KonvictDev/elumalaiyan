<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog | Elumalaiyan Enterprises</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: '#D4AF37' }, fontFamily: { sans: ['Inter'], serif: ['Cinzel'] } } } }
    </script>
</head>
<body class="bg-[#fafafa] dark:bg-[#050505] text-neutral-900 dark:text-white transition-colors duration-500">

    <header id="main-nav" class="fixed top-0 inset-x-0 z-[100] transition-all duration-700 py-8 bg-white/70 dark:bg-black/70 backdrop-blur-2xl border-b dark:border-neutral-900">
        <nav class="max-w-7xl mx-auto px-6 flex justify-between items-center uppercase text-[10px] font-black tracking-[0.3em]">
            <a href="index.html" class="flex items-center gap-4 group">
                <img src="logo.jpeg" alt="Logo" class="h-10 rounded-lg group-hover:scale-110 transition-transform">
                <span class="text-brand">Global Catalog</span>
            </a>
            <div class="flex gap-6 items-center">
                <button id="theme-toggle" class="p-2 border rounded-full w-10 h-10"><i id="theme-icon" class="fa-solid fa-moon"></i></button>
                <a href="index.html" class="border-b border-brand">Home</a>
            </div>
        </nav>
    </header>

    <main class="pt-48 pb-40 max-w-7xl mx-auto px-6">
        <div class="mb-24 space-y-12">
            <h1 class="text-6xl md:text-8xl font-serif font-black tracking-tighter uppercase leading-none mt-4 text-center">The <br> <span class="text-brand opacity-40 italic">Catalog</span></h1>
            <div class="relative max-w-2xl mx-auto">
                <input type="text" id="catalog-search" placeholder="SEARCH BRANDS OR PRODUCTS..." class="w-full bg-white/40 dark:bg-neutral-900/40 backdrop-blur-xl border border-white/20 dark:border-white/5 p-8 rounded-3xl font-black text-xs tracking-widest outline-none focus:ring-2 ring-brand shadow-2xl transition-all">
                <i class="fa-solid fa-magnifying-glass absolute right-8 top-1/2 -translate-y-1/2 opacity-20"></i>
            </div>
        </div>
        <div id="full-catalog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10"></div>
    </main>

    <footer class="bg-neutral-950 text-white py-12 text-center text-[9px] font-black tracking-[0.6em] uppercase">
        © 2026 Elumalaiyan Enterprises
    </footer>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            productEngine({ containerId: 'full-catalog-grid', searchBoxId: 'catalog-search' });
        });
    </script>
</body>
</html>
