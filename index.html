<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Elumalaiyan Enterprises</title>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: { DEFAULT: '#D4AF37' } }, fontFamily: { sans: ['Inter'], serif: ['Cinzel'] } } }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-neutral-950 text-gray-800 dark:text-gray-300 transition-colors duration-300">

            </div>
        </nav>
        <div class="hidden md:flex justify-center gap-8 py-3 border-t dark:border-neutral-800 text-[10px] font-bold uppercase tracking-widest">
            <a href="index.html" class="text-brand">Home</a>
            <a href="products.html" class="hover:text-brand transition-colors">Full Catalog</a>
            <a href="cooling-appliances.html" class="hover:text-brand transition-colors">Cooling</a>
            <a href="kitchen-appliances.html" class="hover:text-brand transition-colors">Kitchen</a>
            <a href="home-lifestyle.html" class="hover:text-brand transition-colors">Lifestyle</a>
            <a href="wooden-beds.html" class="hover:text-brand transition-colors">Furniture</a>

        <div id="mobile-menu" class="hidden md:hidden bg-white dark:bg-neutral-900 p-6 border-t dark:border-neutral-800 space-y-4 font-bold uppercase text-xs tracking-widest">

            <a href="cooling-appliances.html" class="block">Cooling Range</a>

    <main class="max-w-7xl mx-auto px-4 py-16">

            <h2 class="text-2xl font-serif font-bold mb-8 border-b-2 border-brand inline-block uppercase tracking-widest">Featured Collection</h2>
            <div id="featured-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                </div>

    <script src="app.js"></script>

        document.addEventListener('DOMContentLoaded', () => {

        });
