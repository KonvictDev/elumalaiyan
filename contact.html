<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Elumalaiyan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: '#D4AF37' }, fontFamily: { serif: ['Cinzel'] } } } }
        if (localStorage.getItem('color-theme') === 'dark') document.documentElement.classList.add('dark');
    </script>
</head>
<body class="bg-[#fafafa] dark:bg-[#050505] text-neutral-900 dark:text-white">
    <nav class="p-10 flex justify-between items-center">
        <a href="index.html" class="font-serif font-black text-2xl">ELUMALAIYAN</a>
        <button id="theme-toggle" class="w-12 h-12 border rounded-full"><i id="theme-icon" class="fa-solid fa-moon"></i></button>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-20 text-center">
        <h1 class="text-7xl md:text-9xl font-serif font-black tracking-tighter uppercase mb-20 leading-none">Visit <br> <span class="text-brand opacity-30 italic">Showroom.</span></h1>
        
        <div class="grid md:grid-cols-2 gap-12 text-left">
            <div class="bg-white/50 dark:bg-neutral-900/40 backdrop-blur-3xl p-16 rounded-[3rem] border border-white/20 shadow-2xl">
                <h2 class="text-xs font-black tracking-[0.4em] text-brand mb-10 uppercase">Coimbatore Flagship</h2>
                <div class="space-y-8">
                    <p class="text-xl font-bold leading-relaxed"><i class="fa-solid fa-location-dot text-brand mr-4"></i> Cross Cut Road, Coimbatore,<br>Tamil Nadu 641001</p>
                    <p class="text-xl font-bold leading-relaxed"><i class="fa-solid fa-phone text-brand mr-4"></i> +91 98765 43210</p>
                </div>
            </div>

            <div class="bg-neutral-950 p-16 rounded-[3rem] text-white flex flex-col justify-center">
                <h2 class="text-xs font-black tracking-[0.4em] text-brand mb-10 uppercase">Digital Inquiry</h2>
                <p class="text-neutral-500 mb-10 font-bold leading-relaxed">Connect directly with our sales consultants via WhatsApp for bespoke pricing and home delivery details.</p>
                <a href="https://wa.me/919876543210" class="block bg-brand text-black py-6 rounded-2xl font-black text-xs tracking-widest text-center hover:bg-white transition-all shadow-xl">START CHAT</a>
            </div>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
