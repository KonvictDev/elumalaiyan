<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Catalog | Elumalaiyan Enterprises</title>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: '#D4AF37' }, fontFamily: { sans: ['Inter'], serif: ['Cinzel'] } } } }
    </script>
</head>
<body class="bg-[#fafafa] dark:bg-[#050505] text-neutral-900 dark:text-white transition-colors duration-500 selection:bg-brand selection:text-black">

    <header id="main-nav" class="fixed top-0 inset-x-0 z-[100] transition-all duration-700 py-8">
        <nav class="max-w-7xl mx-auto px-6 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <button id="mobile-menu-button" class="lg:hidden text-2xl"><i class="fa-solid fa-bars-staggered"></i></button>
                <a href="index.html" class="flex items-center gap-4 group">
                    <img src="logo.jpeg" alt="Logo" class="h-12 md:h-16 rounded-xl group-hover:scale-110 transition-transform">
                    <span class="text-2xl font-serif font-black tracking-widest uppercase">ELUMALAIYAN</span>
                </a>
            </div>
            <div class="flex items-center gap-6">
                <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center border dark:border-neutral-800 rounded-full hover:border-brand"><i id="theme-icon" class="fa-solid fa-moon"></i></button>
                <a href="index.html" class="text-[10px] font-black tracking-[0.3em] uppercase border-b-2 border-brand">Home</a>
            </div>
        </nav>
        <div id="mobile-menu" class="hidden fixed inset-0 top-[110px] bg-white/95 dark:bg-black/95 backdrop-blur-3xl p-10 flex flex-col gap-8 text-center uppercase tracking-widest font-black text-xl">
            <a href="index.html">Home</a>
            <a href="products.html" class="text-brand">Catalog</a>
            <a href="cooling-appliances.html">Cooling</a>
            <a href="kitchen-appliances.html">Kitchen</a>
            <a href="wooden-beds.html">Furniture</a>
            <a href="contact.html" class="mt-10 border-2 border-brand py-4 rounded-2xl">Contact</a>
        </div>
    </header>

    <main class="pt-48 pb-40 max-w-7xl mx-auto px-6">
        <div class="mb-24 space-y-12">
            <div class="text-center">
                <h1 class="text-6xl md:text-8xl font-serif font-black tracking-tighter uppercase leading-none mt-4">Full <br> <span class="text-brand opacity-40 italic">Catalog</span></h1>
            </div>
            <div class="relative max-w-2xl mx-auto">
                <input type="text" id="catalog-search" placeholder="SEARCH BRANDS OR PRODUCTS..." class="w-full bg-white/40 dark:bg-neutral-900/40 backdrop-blur-xl border border-white/20 dark:border-white/5 p-8 rounded-3xl font-black text-xs tracking-widest outline-none focus:ring-2 ring-brand shadow-2xl transition-all">
                <i class="fa-solid fa-magnifying-glass absolute right-8 top-1/2 -translate-y-1/2 opacity-20"></i>
            </div>
        </div>
        <div id="full-catalog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10"></div>
    </main>

    <footer class="bg-neutral-950 text-white pt-32 pb-12 relative">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-brand to-transparent opacity-30"></div>
        <div class="max-w-7xl mx-auto px-6 text-center opacity-40 uppercase text-[9px] font-black tracking-[0.6em]">
            <p>© 2026 Elumalaiyan Enterprises</p>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            productEngine({ containerId: 'full-catalog-grid', searchBoxId: 'catalog-search' });
        });
    </script>
</body>
</html>
